<!DOCTYPE html>
<html lang="en">
<head>
  <title>Thomas Lowe Reflexes</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</head>
<body>

  <h2>Thomas Lowe reflexes</h2>

  <div id="target">Your time</div>
  <div id="counter">Count</div>

  <button type="button" class="btn btn-primary" onclick="beginTime()">Go</button>
  <button type="button" class="btn btn-secondary" onclick="recordTime()">Halt</button>

  <script>
    var haltTime = undefined;

    function recordTime() {
      haltTime = Date.now();
      console.log(haltTime);
    }

    function beginTime() {
      haltTime = undefined;

      for (let i = 0; i <= 5; i++) {
        setTimeout(function() {
          document.getElementById("counter").innerHTML = i;
        }, (5 - i) * 1000);
      }

      setTimeout(function() {
        if (haltTime === undefined) {
          document.getElementById("target").innerHTML = "Not soon enough";
        } else {
          var targetTime = Date.now();
          var elapsed = targetTime - haltTime;
          document.getElementById("target").innerHTML = "Time was " + elapsed;
        }
      }, 5000);
    }
  </script>

</body>
</html>
