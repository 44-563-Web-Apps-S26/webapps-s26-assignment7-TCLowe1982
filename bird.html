<!DOCTYPE html>
<html>
<head>
    <title>Thomas Lowe Bird Hunt</title>
    <style>
        .grid img {
            width: min(calc(100vw / 7), calc(80vh / 5));
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Thomas Lowe Bird Hunt</h1>

    <p>Click on the locations to find the birds, watch out for the forbidden statue</p>

    <div class="grid">
        <div><img id="loc0" onclick="check(0)" src="Images/bush.png"><img id="loc1" onclick="check(1)" src="Images/bush.png"><img id="loc2" onclick="check(2)" src="Images/bush.png"><img id="loc3" onclick="check(3)" src="Images/bush.png"><img id="loc4" onclick="check(4)" src="Images/bush.png"><img id="loc5" onclick="check(5)" src="Images/bush.png"><img id="loc6" onclick="check(6)" src="Images/bush.png"></div>
        <div><img id="loc7" onclick="check(7)" src="Images/bush.png"><img id="loc8" onclick="check(8)" src="Images/bush.png"><img id="loc9" onclick="check(9)" src="Images/bush.png"><img id="loc10" onclick="check(10)" src="Images/bush.png"><img id="loc11" onclick="check(11)" src="Images/bush.png"><img id="loc12" onclick="check(12)" src="Images/bush.png"><img id="loc13" onclick="check(13)" src="Images/bush.png"></div>
        <div><img id="loc14" onclick="check(14)" src="Images/bush.png"><img id="loc15" onclick="check(15)" src="Images/bush.png"><img id="loc16" onclick="check(16)" src="Images/bush.png"><img id="loc17" onclick="check(17)" src="Images/bush.png"><img id="loc18" onclick="check(18)" src="Images/bush.png"><img id="loc19" onclick="check(19)" src="Images/bush.png"><img id="loc20" onclick="check(20)" src="Images/bush.png"></div>
        <div><img id="loc21" onclick="check(21)" src="Images/bush.png"><img id="loc22" onclick="check(22)" src="Images/bush.png"><img id="loc23" onclick="check(23)" src="Images/bush.png"><img id="loc24" onclick="check(24)" src="Images/bush.png"><img id="loc25" onclick="check(25)" src="Images/bush.png"><img id="loc26" onclick="check(26)" src="Images/bush.png"><img id="loc27" onclick="check(27)" src="Images/bush.png"></div>
        <div><img id="loc28" onclick="check(28)" src="Images/bush.png"><img id="loc29" onclick="check(29)" src="Images/bush.png"><img id="loc30" onclick="check(30)" src="Images/bush.png"><img id="loc31" onclick="check(31)" src="Images/bush.png"><img id="loc32" onclick="check(32)" src="Images/bush.png"><img id="loc33" onclick="check(33)" src="Images/bush.png"><img id="loc34" onclick="check(34)" src="Images/bush.png"></div>
    </div>

    <p id="locations">Number of locations checked is zero.</p>

    <p id="score">Score is zero.</p>

    <p onclick="help()">Click for help.</p>

    <p id="help">Help report</p>

    <script>
        var ids = ["loc0","loc1","loc2","loc3","loc4","loc5","loc6",
                   "loc7","loc8","loc9","loc10","loc11","loc12","loc13",
                   "loc14","loc15","loc16","loc17","loc18","loc19","loc20",
                   "loc21","loc22","loc23","loc24","loc25","loc26","loc27",
                   "loc28","loc29","loc30","loc31","loc32","loc33","loc34"];
        var score = 0;
        var locationsVisited = 0;
        var lastLocation = 0;
        var gameOver = false;

        function pickUnique(count, exclude) {
            var result = [];
            while (result.length < count) {
                var pos = Math.floor(Math.random() * 35);
                if (!exclude.includes(pos) && !result.includes(pos)) {
                    result.push(pos);
                }
            }
            return result;
        }

        var taken = [];
        var statueLocation = pickUnique(1, taken)[0];
        taken.push(statueLocation);
        var toucanLocation = pickUnique(1, taken)[0];
        taken.push(toucanLocation);
        var lorikeetLocations = pickUnique(2, taken);
        taken = taken.concat(lorikeetLocations);
        var buntingLocations = pickUnique(5, taken);

        function check(position) {
            if (gameOver) return;

            var id = ids[position];
            var img = document.getElementById(id);

            if (position === statueLocation) {
                img.src = "Images/gold_statute.png";
                img.onclick = null;
            } else if (position === toucanLocation) {
                img.src = "Images/toucan.png";
                img.onclick = null;
                score += 5;
                gameOver = true;
            } else if (lorikeetLocations.includes(position)) {
                img.src = "Images/lorikeet.png";
                img.onclick = null;
                score += 3;
            } else if (buntingLocations.includes(position)) {
                img.src = "Images/bunting.png";
                img.onclick = null;
                score += 1;
            }

            locationsVisited += 1;

            if (position === statueLocation) {
                gameOver = true;
                score -= 3;
            }

            document.getElementById("locations").textContent = "Number of locations checked is " + locationsVisited + ".";
            document.getElementById("score").textContent = "Score is " + score + ".";

            lastLocation = position;

            if (!gameOver) {
                moveToucan();
            }
        }

        function moveToucan() {
            var row = Math.floor(toucanLocation / 7);
            var col = toucanLocation % 7;

            var directions = [[-1, 0], [1, 0], [0, -1], [0, 1]]; // N, S, W, E
            var valid = directions.filter(function(d) {
                var nr = row + d[0];
                var nc = col + d[1];
                return nr >= 0 && nr <= 4 && nc >= 0 && nc <= 6;
            });

            var dir = valid[Math.floor(Math.random() * valid.length)];
            toucanLocation = (row + dir[0]) * 7 + (col + dir[1]);
        }

        function help() {
            var row = Math.floor(lastLocation / 7);
            var col = lastLocation % 7;

            // 4 neighbors with wrap: ±1 wraps within the same row, ±7 wraps across rows
            var rightNeighbor = row * 7 + (col + 1) % 7;
            var leftNeighbor  = row * 7 + (col - 1 + 7) % 7;
            var downNeighbor  = (lastLocation + 7) % 35;
            var upNeighbor    = (lastLocation - 7 + 35) % 35;

            var buntingNeighbors = [rightNeighbor, leftNeighbor, downNeighbor, upNeighbor];
            for (var i = 0; i < buntingNeighbors.length; i++) {
                if (buntingLocations.includes(buntingNeighbors[i])) {
                    document.getElementById("help").textContent = "cheep";
                    return;
                }
            }

            // 9-cell block centered on lastLocation, no wrap
            var nineLocations = [];
            for (var r = Math.max(0, row - 1); r <= Math.min(4, row + 1); r++) {
                for (var c = Math.max(0, col - 1); c <= Math.min(6, col + 1); c++) {
                    nineLocations.push(r * 7 + c);
                }
            }

            if (nineLocations.includes(toucanLocation)) {
                document.getElementById("help").textContent = "caw";
                return;
            }

            if (nineLocations.includes(statueLocation)) {
                document.getElementById("help").textContent = "thrrum";
                return;
            }

            document.getElementById("help").textContent = "silence";
        }
    </script>

</body>
</html>
